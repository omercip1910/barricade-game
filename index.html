<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Barricade Platinum Plus</title>
    <style>
        :root { --bg: #050505; --gold: #ff8c00; --red: #ff4757; --blue: #2e86de; }
        * { touch-action: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; }
        
        .navbar { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 5px; position: relative; }
        .scoreboard { display: flex; gap: 8px; }
        .card { flex: 1; background: #111; padding: 10px; border-radius: 12px; text-align: center; border: 2px solid #222; }
        .active-turn { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); }
        .num { font-size: 1.6rem; font-weight: 900; display: block; color: var(--gold); }
        
        .btn-group { display: flex; gap: 4px; width: 100%; flex-wrap: wrap; margin-top: 5px; }
        button { background: #1a1a1a; color: #eee; border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; flex: 1; }
        button.active { background: var(--gold); color: black; border-color: var(--gold); box-shadow: 0 0 8px var(--gold); }

        #msg { height: 35px; color: var(--gold); font-weight: bold; font-size: 1rem; text-align: center; margin: 5px 0; text-shadow: 0 0 5px black; }

        .canvas-container { position: relative; width: 98vw; max-width: 420px; aspect-ratio: 1/1; background: #111; border-radius: 20px; padding: 8px; border: 3px solid var(--gold); }
        canvas { width: 100%; height: 100%; background: #000; border-radius: 12px; display: block; }

        #help-btn { position: absolute; right: 0; top: -45px; background: var(--gold); color: black; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; }
    </style>
</head>
<body>

    <div class="navbar">
        <div id="help-btn" onclick="alert('KURALLAR:\n1- Rakibi hapsedemezsin!\n2- Karşı tarafa ilk ulaşan kazanır.\n3- Barikatları dikkatli kullan!')">?</div>
        <div class="scoreboard">
            <div id="c0" class="card active-turn"><span id="w0" class="num">10</span><span class="label" style="color:var(--red)">OYUNCU</span></div>
            <div id="c1" class="card"><span id="w1" class="num">10</span><span id="n1" class="label" style="color:var(--blue)">BOT</span></div>
        </div>
        <div class="btn-group">
            <button id="m_easy" onclick="setDiff('easy')">KOLAY</button>
            <button id="m_med" onclick="setDiff('med')">ORTA</button>
            <button id="m_hard" class="active" onclick="setDiff('hard')">ZOR</button>
            <button id="m_insane" onclick="setDiff('insane')" style="color:red">İMKANSIZ</button>
        </div>
    </div>

    <div id="msg"></div>
    <div class="canvas-container"><canvas id="game" width="420" height="420"></canvas></div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 7, CELL = 60;
    let state = { players: [{x:3,y:6,w:10,c:'#ff4757'},{x:3,y:0,w:10,c:'#2e86de'}], turn: 0, walls: [], diff: 'hard', over: false };

    function setDiff(d) {
        state.diff = d;
        ['easy','med','hard','insane'].forEach(id => document.getElementById('m_'+id).className = (id===d?'active':''));
        reset();
    }

    function draw() {
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,420,420);
        ctx.strokeStyle = "#222"; 
        for(let i=0; i<=GRID; i++) {
            ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,420); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(420,i*CELL); ctx.stroke();
        }
        state.walls.forEach(w => {
            ctx.fillStyle = var(--gold);
            ctx.shadowBlur = 10; ctx.shadowColor = var(--gold);
            if(w.t === 'v') ctx.fillRect((w.x+1)*CELL-5, w.y*CELL+2, 10, CELL-4);
            else ctx.fillRect(w.x*CELL+2, (w.y+1)*CELL-5, CELL-4, 10);
            ctx.shadowBlur = 0;
        });
        state.players.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x*CELL+30, p.y*CELL+30, 24, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill();
            if(state.turn === i) { ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.stroke(); }
        });
        document.getElementById('w0').innerText = state.players[0].w;
        document.getElementById('w1').innerText = state.players[1].w;
        document.getElementById('c0').className = `card ${state.turn===0?'active-turn':''}`;
        document.getElementById('c1').className = `card ${state.turn===1?'active-turn':''}`;
    }

    function isBlocked(x1, y1, x2, y2, walls) {
        if (x1 === x2) return walls.some(w => w.t === 'h' && w.x === x1 && w.y === Math.min(y1, y2));
        if (y1 === y2) return walls.some(w => w.t === 'v' && w.y === y1 && w.x === Math.min(x1, x2));
        return false;
    }

    function hasPath(px, py, targetY, walls) {
        let q = [{x:px, y:py}], vis = new Set([`${px},${py}`]);
        while(q.length) {
            let c = q.shift(); if(c.y === targetY) return true;
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy]) => {
                let nx = c.x+dx, ny = c.y+dy;
                if(nx>=0 && nx<GRID && ny>=0 && ny<GRID && !vis.has(`${nx},${ny}`) && !isBlocked(c.x, c.y, nx, ny, walls)) {
                    vis.add(`${nx},${ny}`); q.push({x:nx, y:ny});
                }
            });
        }
        return false;
    }

    function handleInput(e) {
        if(state.over || state.turn===1) return;
        const r = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = (clientX-r.left)*(420/r.width), y = (clientY-r.top)*(420/r.height);
        const cx = Math.floor(x/CELL), cy = Math.floor(y/CELL), mx = x%CELL, my = y%CELL;

        if(mx > 45 && cx < 6 && state.players[0].w > 0) { placeWall(cx, cy, 'v'); return; }
        if(my > 45 && cy < 6 && state.players[0].w > 0) { placeWall(cx, cy, 'h'); return; }

        let p = state.players[0];
        if(Math.abs(cx-p.x)+Math.abs(cy-p.y)===1 && !isBlocked(p.x,p.y,cx,cy, state.walls)) {
            p.x = cx; p.y = cy;
            if(p.y===0) { state.over=true; document.getElementById('msg').innerText = "TEBRİKLER, KAZANDIN!"; }
            next();
        }
    }

    function placeWall(x, y, t) {
        if(state.walls.find(w => w.x===x && w.y===y && w.t===t)) return;
        let testWalls = [...state.walls, {x, y, t}];
        if(!hasPath(state.players[0].x, state.players[0].y, 0, testWalls) || !hasPath(state.players[1].x, state.players[1].y, 6, testWalls)) {
            document.getElementById('msg').innerText = "YOLU KAPATAMAZSIN!"; return;
        }
        state.walls.push({x, y, t}); state.players[state.turn].w--; next();
    }

    function next() { if(!state.over) document.getElementById('msg').innerText = ""; state.turn = 1-state.turn; draw(); if(!state.over && state.turn===1) setTimeout(botMove, 600); }

    function botMove() {
        let b = state.players[1], p = state.players[0];
        // BOT ZEKASI: İmkansız ve Zor modda engelleme yapar
        if((state.diff === 'insane' || state.diff === 'hard') && b.w > 0 && Math.random() > 0.4) {
            let wx = p.x, wy = p.y - (state.diff === 'insane' ? 1 : 0);
            if(wy >= 0 && wy < 6) {
                let testWalls = [...state.walls, {x:wx, y:wy, t:'h'}];
                if(hasPath(p.x, p.y, 0, testWalls)) { state.walls.push({x:wx, y:wy, t:'h'}); b.w--; next(); return; }
            }
        }
        // Akıllı Hareket (Basit Yol Takibi)
        let moves = [[0,1],[1,0],[-1,0],[0,-1]].filter(m => {
            let nx = b.x+m[0], ny = b.y+m[1];
            return nx>=0 && nx<GRID && ny>=0 && ny<GRID && !isBlocked(b.x,b.y,nx,ny,state.walls);
        });
        moves.sort((a,b) => (6-(b.y+b[1])) - (6-(a.y+a[1]))); // Hedefe yaklaştıran hamleyi seç
        if(moves.length) { b.x += moves[0][0]; b.y += moves[0][1]; }
        if(b.y===6) { state.over=true; document.getElementById('msg').innerText = "BOT KAZANDI!"; }
        next();
    }

    function reset() { state.players[0].x=3; state.players[0].y=6; state.players[1].x=3; state.players[1].y=0; state.players[0].w=10; state.players[1].w=10; state.walls=[]; state.turn=0; state.over=false; document.getElementById('msg').innerText=""; draw(); }
    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive:false});
    draw();
</script>
</body>
</html>
