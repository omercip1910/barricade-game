<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Platinum Neon Edition</title>
    <style>
        :root { 
            --gold: #ff8c00; 
            --bg: #030303;
            --neon-green: #39ff14;
            --neon-yellow: #fefe33;
            --neon-red: #ff3131;
        }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .header { text-align: center; margin-bottom: 10px; width: 420px; }
        #msg { font-weight: bold; font-size: 1.2rem; min-height: 30px; transition: 0.3s; }

        .scoreboard { display: flex; gap: 10px; width: 420px; margin-bottom: 15px; }
        .card { flex: 1; background: #111; border: 2px solid #222; padding: 12px; border-radius: 15px; text-align: center; transition: 0.5s; }
        .num { font-size: 2rem; font-weight: 900; color: white; }
        
        /* Buton Grubu ve Neon Renkler */
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        button { background: #111; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.8rem; transition: 0.3s; border: 2px solid transparent; }
        
        /* Kolay - Yeşil */
        #b_easy { color: var(--neon-green); border-color: rgba(57, 255, 20, 0.3); }
        #b_easy.active { background: var(--neon-green); color: black; box-shadow: 0 0 20px var(--neon-green); border-color: white; }
        
        /* Zor - Sarı */
        #b_hard { color: var(--neon-yellow); border-color: rgba(254, 254, 51, 0.3); }
        #b_hard.active { background: var(--neon-yellow); color: black; box-shadow: 0 0 20px var(--neon-yellow); border-color: white; }
        
        /* İmkansız - Kırmızı */
        #b_insane { color: var(--neon-red); border-color: rgba(255, 49, 49, 0.3); }
        #b_insane.active { background: var(--neon-red); color: white; box-shadow: 0 0 20px var(--neon-red); border-color: white; }

        .canvas-wrap { border: 4px solid #1a1a1a; border-radius: 20px; padding: 5px; background: #111; transition: 0.5s; }
        canvas { background: #000; display: block; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="header"><div id="msg">ZORLUK SEÇİN</div></div>

    <div class="scoreboard">
        <div id="c0" class="card"><small>SİZ</small><div class="num" id="w0">10</div></div>
        <div id="c1" class="card"><small>BOT</small><div class="num" id="w1">10</div></div>
    </div>

    <div class="btn-group">
        <button id="b_easy" onclick="setDiff('easy')">KOLAY</button>
        <button id="b_hard" onclick="setDiff('hard')">ZOR</button>
        <button id="b_insane" class="active" onclick="setDiff('insane')">İMKANSIZ</button>
    </div>

    <div class="canvas-wrap" id="main-frame">
        <canvas id="game" width="420" height="420"></canvas>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 7, CELL = 60;
    
    let state = {
        turn: 0, walls: [], over: false, diff: 'insane',
        colors: { easy: '#39ff14', hard: '#fefe33', insane: '#ff3131' },
        players: [{x:3, y:6, w:10, c:'#ffffff', ty:0}, {x:3, y:0, w:10, c:'#00e5ff', ty:6}]
    };

    function setDiff(d) {
        state.diff = d;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById('b_'+d).classList.add('active');
        
        // Görsel efektleri güncelle
        const accent = state.colors[d];
        document.getElementById('msg').style.color = accent;
        document.getElementById('msg').style.textShadow = `0 0 10px ${accent}`;
        document.getElementById('main-frame').style.borderColor = accent;
        document.getElementById('main-frame').style.boxShadow = `0 0 30px ${accent}44`;
        
        reset();
    }

    function reset() {
        state.players[0].x=3; state.players[0].y=6; state.players[0].w=10;
        state.players[1].x=3; state.players[1].y=0; state.players[1].w=10;
        state.walls=[]; state.turn=0; state.over=false;
        document.getElementById('msg').innerText = "HAMLE SIRASI SİZDE"; draw();
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,420,420);
        ctx.strokeStyle = '#151515';
        for(let i=0; i<=GRID; i++) {
            ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,420); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(420,i*CELL); ctx.stroke();
        }
        
        const wallColor = state.colors[state.diff];
        state.walls.forEach(w => {
            ctx.fillStyle = wallColor; ctx.shadowBlur = 15; ctx.shadowColor = wallColor;
            if(w.t === 'v') ctx.fillRect((w.x+1)*CELL-5, w.y*CELL+4, 10, CELL-8);
            else ctx.fillRect(w.x*CELL+4, (w.y+1)*CELL-5, CELL-8, 10);
            ctx.shadowBlur = 0;
        });

        state.players.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x*CELL+30, p.y*CELL+30, 24, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill();
            if(state.turn === i) { 
                ctx.strokeStyle = wallColor; ctx.lineWidth = 4; ctx.stroke(); 
                ctx.shadowBlur = 15; ctx.shadowColor = wallColor; ctx.stroke();
            }
            ctx.shadowBlur = 0;
        });

        document.getElementById('w0').innerText = state.players[0].w;
        document.getElementById('w1').innerText = state.players[1].w;
        const activeCard = document.getElementById('c'+state.turn);
        document.querySelectorAll('.card').forEach(c => {
            c.classList.remove('active');
            c.style.borderColor = "#222";
            c.style.boxShadow = "none";
        });
        activeCard.classList.add('active');
        activeCard.style.borderColor = wallColor;
        activeCard.style.boxShadow = `0 0 20px ${wallColor}`;
    }

    // Algoritma Fonksiyonları (Dijkstra/Pathfinding)
    function getPathLen(px, py, ty, walls) {
        let q = [{x:px, y:py, d:0}], vis = new Set([px+','+py]);
        while(q.length) {
            let c = q.shift(); if(c.y === ty) return c.d;
            for(let [dx,dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx=c.x+dx, ny=c.y+dy;
                if(nx>=0 && nx<GRID && ny>=0 && ny<GRID && !vis.has(nx+','+ny) && !isBlocked(c.x,c.y,nx,ny,walls)) {
                    vis.add(nx+','+ny); q.push({x:nx, y:ny, d:c.d+1});
                }
            }
        }
        return 999;
    }

    function isBlocked(x1,y1,x2,y2, walls) {
        if(x1===x2) return walls.some(w => w.t==='h' && w.x===x1 && w.y===Math.min(y1,y2));
        return walls.some(w => w.t==='v' && w.y===y1 && w.x===Math.min(x1,x2));
    }

    function placeWall(x,y,t, pIdx) {
        if(state.players[pIdx].w <= 0) return false;
        if(state.walls.find(w=>w.x===x && w.y===y && w.t===t)) return false;
        let test = [...state.walls, {x,y,t}];
        if(getPathLen(state.players[0].x, state.players[0].y, 0, test) < 999 && 
           getPathLen(state.players[1].x, state.players[1].y, 6, test) < 999) {
            state.walls.push({x,y,t}); state.players[pIdx].w--; return true;
        }
        return false;
    }

    canvas.addEventListener('mousedown', e => {
        if(state.over || state.turn !== 0) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX-rect.left)*(420/rect.width), y = (e.clientY-rect.top)*(420/rect.height);
        const cx = Math.floor(x/CELL), cy = Math.floor(y/CELL), mx = x%CELL, my = y%CELL;

        if(mx > 45 && cx < 6 && placeWall(cx, cy, 'v', 0)) { next(); return; }
        if(my > 45 && cy < 6 && placeWall(cx, cy, 'h', 0)) { next(); return; }

        let p = state.players[0];
        if(Math.abs(cx-p.x)+Math.abs(cy-p.y)===1 && !isBlocked(p.x,p.y,cx,cy,state.walls)) {
            p.x=cx; p.y=cy; if(p.y===0) end("KAZANDIN!"); else next();
        }
    });

    function next() { state.turn = 1-state.turn; draw(); if(!state.over && state.turn===1) setTimeout(bot, 500); }

    function bot() {
        let b = state.players[1], p = state.players[0];
        let pDist = getPathLen(p.x, p.y, 0, state.walls);
        let bDist = getPathLen(b.x, b.y, 6, state.walls);

        if(state.diff === 'easy') {
            if(Math.random() < 0.2 && b.w > 0) placeWall(Math.floor(Math.random()*6), Math.floor(Math.random()*6), Math.random()>0.5?'h':'v', 1);
        } else if(state.diff === 'hard') {
            if(b.w > 0 && pDist < 4) placeWall(p.x, p.y-1, 'h', 1);
        } else if(state.diff === 'insane' && b.w > 0) {
            if(pDist <= bDist || p.y < 4) {
                if(placeWall(p.x, p.y-1, 'h', 1)) { next(); return; }
                if(p.x < 6 && placeWall(p.x, p.y, 'v', 1)) { next(); return; }
            }
        }

        let moves = [[0,1],[1,0],[-1,0],[0,-1]].filter(m => {
            let nx=b.x+m[0], ny=b.y+m[1];
            return nx>=0 && nx<GRID && ny>=0 && ny<GRID && !isBlocked(b.x,b.y,nx,ny,state.walls);
        });
        if(state.diff === 'easy' && Math.random() < 0.4) moves.sort(() => Math.random() - 0.5);
        else moves.sort((a,b) => getPathLen(b.x+a[0], b.y+a[1], 6, state.walls) - getPathLen(b.x+b[0], b.y+b[1], 6, state.walls));
        
        if(moves.length) { b.x+=moves[0][0]; b.y+=moves[0][1]; }
        if(b.y===6) end("BOT KAZANDI!"); else next();
    }

    function end(m) { state.over=true; document.getElementById('msg').innerText = m; draw(); }
    
    // İlk açılışta İmkansız (Kırmızı) modun efektlerini yükle
    setDiff('insane');
</script>
</body>
</html>
