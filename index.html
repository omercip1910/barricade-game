<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Barricade Elite | Pro Edition</title>
    <style>
        :root { --primary: #ff8c00; --red: #ff4757; --blue: #2e86de; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* SCOREBOARD */
        .header-ui { width: 100%; background: #111; border-bottom: 2px solid #222; padding: 15px 0; display: flex; flex-direction: column; align-items: center; }
        .scoreboard { display: flex; gap: 20px; margin-bottom: 10px; }
        .card { background: #1a1a1a; padding: 10px 25px; border-radius: 12px; text-align: center; border: 2px solid #333; min-width: 140px; transition: 0.3s; opacity: 0.5; }
        .card.active { opacity: 1; transform: translateY(5px); }
        .card.active.red { border-color: var(--red); box-shadow: 0 0 15px var(--red); }
        .card.active.blue { border-color: var(--blue); box-shadow: 0 0 15px var(--blue); }
        .wall-num { font-size: 1.8rem; font-weight: bold; display: block; }
        .label { font-size: 0.7rem; color: #666; text-transform: uppercase; }

        /* KONTROL PANELİ */
        .controls { margin: 20px 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .row { display: flex; gap: 10px; }
        .btn-mode, .btn-diff { background: #222; color: #888; border: 1px solid #444; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; transition: 0.2s; }
        .btn-mode.active, .btn-diff.active { background: var(--primary); color: black; font-weight: bold; border-color: var(--primary); }
        
        canvas { background: #000; border: 2px solid #333; border-radius: 8px; cursor: pointer; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #msg { height: 25px; color: var(--primary); font-weight: bold; margin-top: 10px; }
        .reset-btn { margin-top: 15px; background: transparent; color: #555; border: 1px solid #333; padding: 8px 20px; border-radius: 5px; cursor: pointer; }
        .reset-btn:hover { color: white; border-color: white; }
    </style>
</head>
<body>

<div class="header-ui">
    <div class="scoreboard">
        <div id="card0" class="card">
            <span class="label" style="color:var(--red)">OYUNCU 1</span>
            <span id="count0" class="wall-num" style="color:var(--red)">10</span>
            <span class="label">ENGEL</span>
        </div>
        <div id="card1" class="card">
            <span id="name1" class="label" style="color:var(--blue)">BOT</span>
            <span id="count1" class="wall-num" style="color:var(--blue)">10</span>
            <span class="label">ENGEL</span>
        </div>
    </div>
    
    <div class="controls">
        <div class="row">
            <button id="pve" class="btn-mode active" onclick="setMode('pve')">BOT'A KARŞI</button>
            <button id="pvp" class="btn-mode" onclick="setMode('pvp')">2 OYUNCU</button>
        </div>
        <div id="diff-row" class="row">
            <button class="btn-diff" onclick="setDiff('easy')">KOLAY</button>
            <button class="btn-diff active" onclick="setDiff('medium')">ORTA</button>
            <button class="btn-diff" onclick="setDiff('hard')">ZOR</button>
            <button class="btn-diff" onclick="setDiff('impossible')">İMKANSIZ</button>
        </div>
    </div>
</div>

<div id="msg"></div>
<canvas id="gameCanvas" width="420" height="420"></canvas>
<button class="reset-btn" onclick="location.reload()">OYUNU SIFIRLA</button>

<script>
window.onload = function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgDiv = document.getElementById('msg');
    
    const GRID = 7; const CELL = 60;
    let state = {
        players: [{x:3, y:6, walls:10, color:'#ff4757'}, {x:3, y:0, walls:10, color:'#2e86de'}],
        turn: 0, walls: [], gameOver: false, mode: 'pve', diff: 'medium'
    };

    window.setMode = (m) => { 
        state.mode = m; 
        document.getElementById('pve').className = m === 'pve' ? 'btn-mode active' : 'btn-mode';
        document.getElementById('pvp').className = m === 'pvp' ? 'btn-mode active' : 'btn-mode';
        document.getElementById('name1').innerText = m === 'pvp' ? 'OYUNCU 2' : 'BOT';
        document.getElementById('diff-row').style.display = m === 'pvp' ? 'none' : 'flex';
        reset();
    };

    window.setDiff = (d) => {
        state.diff = d;
        document.querySelectorAll('.btn-diff').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        reset();
    };

    function draw() {
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 420, 420);
        ctx.strokeStyle = "#1a1a1a";
        for(let i=0; i<=GRID; i++) {
            ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, 420); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(420, i*CELL); ctx.stroke();
        }
        state.walls.forEach(w => {
            ctx.fillStyle = "#ff8c00"; ctx.shadowBlur = 10; ctx.shadowColor = "#ff8c00";
            if(w.type === 'v') ctx.fillRect((w.x+1)*CELL-5, w.y*CELL, 10, CELL);
            else ctx.fillRect(w.x*CELL, (w.y+1)*CELL-5, CELL, 10);
            ctx.shadowBlur = 0;
        });
        state.players.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x*CELL+30, p.y*CELL+30, 20, 0, Math.PI*2);
            ctx.fillStyle = p.color; ctx.shadowBlur = 15; ctx.shadowColor = p.color;
            ctx.fill(); ctx.shadowBlur = 0;
            if(state.turn === i) { ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke(); }
        });
        document.getElementById('count0').innerText = state.players[0].walls;
        document.getElementById('count1').innerText = state.players[1].walls;
        document.getElementById('card0').className = `card ${state.turn===0?'active red':''}`;
        document.getElementById('card1').className = `card ${state.turn===1?'active blue':''}`;
    }

    function isBlocked(x1, y1, x2, y2) {
        if (x1 === x2) return state.walls.some(w => w.type === 'h' && w.x === x1 && w.y === Math.min(y1, y2));
        if (y1 === y2) return state.walls.some(w => w.type === 'v' && w.y === y1 && w.x === Math.min(x1, x2));
        return false;
    }

    function canReachGoal(playerIdx, tempWalls) {
        let targetY = playerIdx === 0 ? 0 : 6;
        let start = state.players[playerIdx];
        let q = [{x: start.x, y: start.y}];
        let visited = new Set([`${start.x},${start.y}`]);
        while(q.length > 0) {
            let curr = q.shift();
            if(curr.y === targetY) return true;
            let dirs = [{x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0}];
            for(let d of dirs) {
                let nx = curr.x+d.x, ny = curr.y+d.y;
                if(nx>=0 && nx<GRID && ny>=0 && ny<GRID && !visited.has(`${nx},${ny}`)) {
                    let wallsOrig = state.walls; state.walls = tempWalls;
                    let blocked = isBlocked(curr.x, curr.y, nx, ny);
                    state.walls = wallsOrig;
                    if(!blocked) { visited.add(`${nx},${ny}`); q.push({x:nx, y:ny}); }
                }
            }
        }
        return false;
    }

    canvas.addEventListener('mousedown', e => {
        if(state.gameOver || (state.mode === 'pve' && state.turn === 1)) return;
        let rect = canvas.getBoundingClientRect();
        let x = e.clientX-rect.left, y = e.clientY-rect.top;
        let cx = Math.floor(x/CELL), cy = Math.floor(y/CELL);
        let mx = x%CELL, my = y%CELL;

        if (state.players[state.turn].walls > 0 && (mx > 48 || my > 48)) {
            let type = mx > 48 ? 'v' : 'h';
            let tempWalls = [...state.walls, {x:cx, y:cy, type: type}];
            if(!state.walls.find(w => w.x===cx && w.y===cy && w.type===type) && canReachGoal(0, tempWalls) && canReachGoal(1, tempWalls)) {
                state.walls.push({x:cx, y:cy, type: type});
                state.players[state.turn].walls--;
                endTurn();
            } else { msgDiv.innerText = "Yolu tamamen kapatamazsın!"; setTimeout(()=>msgDiv.innerText="", 2000); }
        } else {
            let p = state.players[state.turn], op = state.players[1-state.turn];
            let dist = Math.abs(cx-p.x) + Math.abs(cy-p.y);
            // Zıplama Kuralı
            if(dist === 2 && cx === op.x && cy === op.y) { /* Rakibin üstüne tıklarsan zıpla */ }
            if(dist === 1 && !isBlocked(p.x, p.y, cx, cy)) {
                if(cx === op.x && cy === op.y) { // Üstünden geçme denemesi
                    let jx = cx + (cx-p.x), jy = cy + (cy-p.y);
                    if(jx>=0 && jx<GRID && jy>=0 && jy<GRID && !isBlocked(cx, cy, jx, jy)) { cx = jx; cy = jy; }
                    else return;
                }
                p.x = cx; p.y = cy;
                if(p.y === (state.turn === 0 ? 0 : 6)) { state.gameOver = true; msgDiv.innerText = (state.turn===0?"KIRMIZI":"MAVİ") + " KAZANDI!"; }
                endTurn();
            }
        }
    });

    function endTurn() {
        state.turn = 1 - state.turn;
        draw();
        if(!state.gameOver && state.mode === 'pve' && state.turn === 1) setTimeout(botMove, 500);
    }

    function botMove() {
        let bot = state.players[1], p = state.players[0];
        // Basit BFS yol bulucu
        let path = getPath(bot.x, bot.y, 6);
        if(state.diff === 'easy' && Math.random() > 0.4) { /* Rastgele hata yap */ }
        
        if(state.diff === 'impossible' && Math.random() > 0.5 && bot.walls > 0) {
            let pPath = getPath(p.x, p.y, 0);
            if(pPath && pPath.length < 4) { // Oyuncu yaklaştıysa önüne duvar koy
                state.walls.push({x: pPath[0].x, y: pPath[0].y, type: p.x === pPath[1].x ? 'h' : 'v'});
                bot.walls--; endTurn(); return;
            }
        }
        
        if(path && path[1]) { state.players[1].x = path[1].x; state.players[1].y = path[1].y; }
        if(state.players[1].y === 6) { state.gameOver = true; msgDiv.innerText = "BOT KAZANDI!"; }
        endTurn();
    }

    function getPath(sx, sy, ty) {
        let q = [[{x:sx, y:sy}]]; let v = new Set([`${sx},${sy}`]);
        while(q.length > 0) {
            let path = q.shift(); let n = path[path.length-1];
            if(n.y === ty) return path;
            for(let d of [{x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0}]) {
                let nx = n.x+d.x, ny = n.y+d.y;
                if(nx>=0 && nx<GRID && ny>=0 && ny<GRID && !v.has(`${nx},${ny}`) && !isBlocked(n.x, n.y, nx, ny)) {
                    v.add(`${nx},${ny}`); q.push([...path, {x:nx, y:ny}]);
                }
            }
        }
        return null;
    }

    function reset() { state.players[0].x=3; state.players[0].y=6; state.players[1].x=3; state.players[1].y=0; state.players[0].walls=10; state.players[1].walls=10; state.walls=[]; state.turn=0; state.gameOver=false; msgDiv.innerText=""; draw(); }
    draw();
};
</script>
</body>
</html>
