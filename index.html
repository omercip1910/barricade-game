<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Platinum Plus v2.0</title>
    <style>
        :root { --gold: #ff8c00; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* Turuncu Detaylar */
        .scoreboard { display: flex; gap: 10px; width: 400px; margin-bottom: 10px; }
        .card { flex: 1; background: #111; border: 2px solid #333; padding: 10px; border-radius: 12px; text-align: center; transition: 0.3s; }
        .card.active { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .num { font-size: 1.5rem; color: var(--gold); font-weight: bold; }

        .btn-group { display: flex; gap: 5px; margin-bottom: 10px; }
        button { background: #1a1a1a; color: var(--gold); border: 1px solid var(--gold); padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button.active { background: var(--gold); color: black; }

        .container { position: relative; border: 4px solid var(--gold); border-radius: 15px; box-shadow: 0 0 20px rgba(255,140,0,0.3); }
        canvas { background: #000; display: block; border-radius: 10px; }
        #msg { color: var(--gold); font-weight: bold; height: 25px; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="msg">PLATINUM PLUS SÜRÜMÜ</div>

    <div class="scoreboard">
        <div id="c0" class="card active"><div class="num" id="w0">10</div><small>SİZ</small></div>
        <div id="c1" class="card"><div class="num" id="w1">10</div><small id="n1">BOT</small></div>
    </div>

    <div class="btn-group">
        <button id="b_easy" onclick="setMode('easy')">KOLAY</button>
        <button id="b_hard" onclick="setMode('hard')">ZOR</button>
        <button id="b_insane" class="active" onclick="setMode('insane')">İMKANSIZ</button>
    </div>

    <div class="container">
        <canvas id="game" width="420" height="420"></canvas>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 7, CELL = 60;
    
    let game = {
        turn: 0,
        walls: [],
        players: [{x:3, y:6, w:10, c:'#ff4757'}, {x:3, y:0, w:10, c:'#2e86de'}],
        mode: 'insane',
        over: false
    };

    function setMode(m) {
        game.mode = m;
        document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
        document.getElementById('b_'+m).classList.add('active');
        reset();
    }

    function reset() {
        game.players[0].x = 3; game.players[0].y = 6; game.players[0].w = 10;
        game.players[1].x = 3; game.players[1].y = 0; game.players[1].w = 10;
        game.walls = []; game.turn = 0; game.over = false;
        document.getElementById('msg').innerText = "OYUN BAŞLADI";
        draw();
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,420,420);
        ctx.strokeStyle = '#222';
        for(let i=0; i<=GRID; i++) {
            ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,420); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(420,i*CELL); ctx.stroke();
        }

        game.walls.forEach(w => {
            ctx.fillStyle = '#ff8c00';
            ctx.shadowBlur = 10; ctx.shadowColor = '#ff8c00';
            if(w.t === 'v') ctx.fillRect((w.x+1)*CELL-4, w.y*CELL+2, 8, CELL-4);
            else ctx.fillRect(w.x*CELL+2, (w.y+1)*CELL-4, CELL-4, 8);
            ctx.shadowBlur = 0;
        });

        game.players.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x*CELL+30, p.y*CELL+30, 22, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill();
            if(game.turn === i) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke(); }
        });

        document.getElementById('w0').innerText = game.players[0].w;
        document.getElementById('w1').innerText = game.players[1].w;
        document.getElementById('c0').className = game.turn===0?'card active':'card';
        document.getElementById('c1').className = game.turn===1?'card active':'card';
    }

    // KRİTİK: HAPİS ENGELLEME SİSTEMİ
    function canReachTarget(px, py, targetY, walls) {
        let queue = [{x:px, y:py}], visited = new Set([px+','+py]);
        while(queue.length > 0) {
            let curr = queue.shift();
            if(curr.y === targetY) return true;
            let dirs = [[0,1],[0,-1],[1,0],[-1,0]];
            for(let [dx, dy] of dirs) {
                let nx = curr.x+dx, ny = curr.y+dy;
                if(nx>=0 && nx<GRID && ny>=0 && ny<GRID && !visited.has(nx+','+ny)) {
                    if(!isBlocked(curr.x, curr.y, nx, ny, walls)) {
                        visited.add(nx+','+ny); queue.push({x:nx, y:ny});
                    }
                }
            }
        }
        return false;
    }

    function isBlocked(x1, y1, x2, y2, walls) {
        if(x1 === x2) return walls.some(w => w.t==='h' && w.x===x1 && w.y===Math.min(y1,y2));
        if(y1 === y2) return walls.some(w => w.t==='v' && w.y===y1 && w.x===Math.min(x1,x2));
        return false;
    }

    function placeWall(x, y, t) {
        if(game.players[game.turn].w <= 0) return;
        if(game.walls.find(w => w.x===x && w.y===y && w.t===t)) return;
        
        let tempWalls = [...game.walls, {x, y, t}];
        // HEM OYUNCU HEM BOT İÇİN YOL VAR MI?
        if(canReachTarget(game.players[0].x, game.players[0].y, 0, tempWalls) && 
           canReachTarget(game.players[1].x, game.players[1].y, 6, tempWalls)) {
            game.walls.push({x, y, t});
            game.players[game.turn].w--;
            nextTurn();
        } else {
            document.getElementById('msg').innerText = "HAPSETMEK YASAK!";
        }
    }

    canvas.addEventListener('mousedown', e => {
        if(game.over || game.turn !== 0) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (420/rect.width);
        const y = (e.clientY - rect.top) * (420/rect.height);
        const cx = Math.floor(x/CELL), cy = Math.floor(y/CELL);
        const mx = x%CELL, my = y%CELL;

        if(mx > 45 && cx < 6) { placeWall(cx, cy, 'v'); return; }
        if(my > 45 && cy < 6) { placeWall(cx, cy, 'h'); return; }

        let p = game.players[0];
        if(Math.abs(cx-p.x)+Math.abs(cy-p.y) === 1 && !isBlocked(p.x, p.y, cx, cy, game.walls)) {
            p.x = cx; p.y = cy;
            if(p.y === 0) endGame("KAZANDIN!");
            else nextTurn();
        }
    });

    function nextTurn() {
        game.turn = 1 - game.turn;
        draw();
        if(!game.over && game.turn === 1) setTimeout(botBrain, 600);
    }

    function botBrain() {
        let b = game.players[1], p = game.players[0];
        
        // İMKANSIZ MOD: Oyuncuyu engelle
        if(game.mode === 'insane' && b.w > 0 && Math.random() < 0.7) {
            let targetWall = {x: p.x, y: p.y - 1, t: 'h'};
            if(targetWall.y >= 0 && !game.walls.find(w=>w.x===targetWall.x && w.y===targetWall.y && w.t==='h')) {
                let tw = [...game.walls, targetWall];
                if(canReachTarget(p.x, p.y, 0, tw)) {
                    game.walls.push(targetWall); b.w--; nextTurn(); return;
                }
            }
        }

        // Akıllı İlerleme
        let moves = [[0,1], [1,0], [-1,0], [0,-1]].filter(m => {
            let nx = b.x+m[0], ny = b.y+m[1];
            return nx>=0 && nx<GRID && ny>=0 && ny<GRID && !isBlocked(b.x, b.y, nx, ny, game.walls);
        });
        moves.sort((a,b) => (6-(b.y+b[1])) - (6-(a.y+a[1])));
        
        if(moves.length) { b.x += moves[0][0]; b.y += moves[0][1]; }
        if(b.y === 6) endGame("BOT KAZANDI!");
        else nextTurn();
    }

    function endGame(m) { game.over = true; document.getElementById('msg').innerText = m; draw(); }
    draw();
</script>
</body>
</html>
