<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Platinum Plus</title>
    <style>
        :root { 
            --n-green: #39ff14; --n-yellow: #fefe33; --n-red: #ff3131;
            --bg: #050507;
        }
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden;
        }
        
        .header { text-align: center; margin-bottom: 10px; z-index: 10; }
        h1 { margin: 0; font-size: 1.4rem; letter-spacing: 4px; font-weight: 900; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        #msg { font-size: 0.9rem; margin-top: 5px; height: 20px; font-weight: bold; text-transform: uppercase; }

        .scoreboard { display: flex; gap: 15px; width: 420px; margin-bottom: 15px; }
        .card { 
            flex: 1; background: rgba(255,255,255,0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 18px;
            text-align: center; transition: 0.4s ease-out;
        }
        .num { font-size: 2rem; font-weight: 900; }
        
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        button { 
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 16px; border-radius: 10px; font-weight: bold; cursor: pointer;
            font-size: 0.7rem; color: #777; transition: 0.3s;
        }
        
        button.active[data-m="easy"] { background: var(--n-green); color: #000; box-shadow: 0 0 20px var(--n-green); }
        button.active[data-m="hard"] { background: var(--n-yellow); color: #000; box-shadow: 0 0 20px var(--n-yellow); }
        button.active[data-m="insane"] { background: var(--n-red); color: #fff; box-shadow: 0 0 20px var(--n-red); }

        .game-box {
            position: relative; padding: 8px; background: rgba(255,255,255,0.02);
            border-radius: 22px; border: 1px solid rgba(255,255,255,0.05);
            transition: border-color 0.5s;
        }
        canvas { display: block; border-radius: 14px; background: #000; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BARRICADE PLATINUM PLUS</h1>
        <div id="msg">SİSTEM ANALİZ EDİLİYOR...</div>
    </div>

    <div class="scoreboard">
        <div id="c0" class="card">SİZ<div class="num" id="w0">10</div></div>
        <div id="c1" class="card">BOT<div class="num" id="w1">10</div></div>
    </div>

    <div class="btn-group">
        <button id="b_easy" data-m="easy" onclick="setDiff('easy')">KOLAY</button>
        <button id="b_hard" data-m="hard" onclick="setDiff('hard')">ZOR</button>
        <button id="b_insane" data-m="insane" class="active" onclick="setDiff('insane')">İMKANSIZ</button>
    </div>

    <div class="game-box" id="frame">
        <canvas id="game" width="420" height="420"></canvas>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 7, CELL = 60;
    
    let state = {
        turn: 0, walls: [], over: false, diff: 'insane',
        colors: { easy: '#39ff14', hard: '#fefe33', insane: '#ff3131' },
        players: [{x:3, y:6, w:10, c:'#fff', ty:0}, {x:3, y:0, w:10, c:'#00f2ff', ty:6}],
        pulse: 0
    };

    function setDiff(d) {
        state.diff = d;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById('b_'+d).classList.add('active');
        document.getElementById('frame').style.borderColor = state.colors[d];
        reset();
    }

    function reset() {
        state.players[0].x=3; state.players[0].y=6; state.players[0].w=10;
        state.players[1].x=3; state.players[1].y=0; state.players[1].w=10;
        state.walls=[]; state.turn=0; state.over=false;
        document.getElementById('msg').innerText = "HAMLE BEKLENİYOR";
        animate();
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,420,420);
        
        // Siber Izgara Tasarımı
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        for(let i=0; i<=GRID; i++) {
            ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,420); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(420,i*CELL); ctx.stroke();
        }

        const accent = state.colors[state.diff];
        state.pulse += 0.05;

        // Barikatlar
        state.walls.forEach(w => {
            ctx.fillStyle = accent;
            ctx.shadowBlur = 15; ctx.shadowColor = accent;
            if(w.t === 'v') ctx.fillRect((w.x+1)*CELL-5, w.y*CELL+6, 10, CELL-12);
            else ctx.fillRect(w.x*CELL+6, (w.y+1)*CELL-5, CELL-12, 10);
            ctx.shadowBlur = 0;
        });

        // Piyonlar (Animasyonlu)
        state.players.forEach((p, i) => {
            const active = state.turn === i;
            const glow = active ? Math.sin(state.pulse) * 10 + 15 : 5;
            
            ctx.shadowBlur = glow; ctx.shadowColor = active ? accent : p.c;
            ctx.beginPath();
            ctx.arc(p.x*CELL+30, p.y*CELL+30, 20 + (active?Math.sin(state.pulse)*2:0), 0, Math.PI*2);
            ctx.strokeStyle = active ? '#fff' : 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 3; ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(p.x*CELL+30, p.y*CELL+30, 12, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill();
            ctx.shadowBlur = 0;
        });

        document.getElementById('w0').innerText = state.players[0].w;
        document.getElementById('w1').innerText = state.players[1].w;
        document.getElementById('msg').style.color = accent;
        
        const cards = document.querySelectorAll('.card');
        cards.forEach((c, idx) => {
            c.style.borderColor = state.turn === idx ? accent : "rgba(255,255,255,0.1)";
            c.style.opacity = state.turn === idx ? "1" : "0.5";
        });
    }

    function animate() { if(!state.over) { draw(); requestAnimationFrame(animate); } }

    function getPath(px, py, ty, walls) {
        let q = [{x:px, y:py, p:[]}], vis = new Set([px+','+py]);
        while(q.length) {
            let c = q.shift(); if(c.y === ty) return c.p;
            for(let [dx,dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx=c.x+dx, ny=c.y+dy;
                if(nx>=0 && nx<GRID && ny>=0 && ny<GRID && !vis.has(nx+','+ny) && !isBlocked(c.x,c.y,nx,ny,walls)) {
                    vis.add(nx+','+ny); q.push({x:nx, y:ny, p:[...c.p, {x:nx, y:ny}]});
                }
            }
        }
        return null;
    }

    function isBlocked(x1,y1,x2,y2, walls) {
        if(x1===x2) return walls.some(w => w.t==='h' && w.x===x1 && w.y===Math.min(y1,y2));
        return walls.some(w => w.t==='v' && w.y===y1 && w.x===Math.min(x1,x2));
    }

    function placeWall(x,y,t, pIdx) {
        if(state.players[pIdx].w <= 0 || state.walls.find(w=>w.x===x && w.y===y && w.t===t)) return false;
        let test = [...state.walls, {x,y,t}];
        if(getPath(state.players[0].x, state.players[0].y, 0, test) && getPath(state.players[1].x, state.players[1].y, 6, test)) {
            state.walls.push({x,y,t}); state.players[pIdx].w--; return true;
        }
        return false;
    }

    canvas.addEventListener('mousedown', e => {
        if(state.over || state.turn !== 0) return;
        const r = canvas.getBoundingClientRect();
        const x = (e.clientX-r.left)*(420/r.width), y = (e.clientY-r.top)*(420/r.height);
        const cx = Math.floor(x/CELL), cy = Math.floor(y/CELL), mx = x%CELL, my = y%CELL;

        if(mx > 45 && cx < 6 && placeWall(cx, cy, 'v', 0)) { next(); return; }
        if(my > 45 && cy < 6 && placeWall(cx, cy, 'h', 0)) { next(); return; }

        let p = state.players[0];
        if(Math.abs(cx-p.x)+Math.abs(cy-p.y)===1 && !isBlocked(p.x,p.y,cx,cy,state.walls)) {
            p.x=cx; p.y=cy; if(p.y===0) end("KAZANDIN"); else next();
        }
    });

    function next() { 
        if(state.over) return;
        state.turn = 1-state.turn; 
        if(state.turn===1) setTimeout(botBrain, 400); 
    }

    function botBrain() {
        let b = state.players[1], p = state.players[0];
        let pPath = getPath(p.x, p.y, 0, state.walls) || [];
        let bPath = getPath(b.x, b.y, 6, state.walls) || [];

        // --- İMKANSIZ MOD: KRİTİK ANALİZ ---
        if(state.diff === 'insane' && b.w > 0) {
            // Sadece yolu kesme, piyonun gidebileceği EN KRİTİK noktayı engelle
            if(pPath.length <= bPath.length || p.y < 3) {
                for(let node of pPath) {
                    if(placeWall(node.x, node.y - 1, 'h', 1)) { next(); return; }
                    if(placeWall(node.x, node.y, 'v', 1)) { next(); return; }
                }
            }
        }

        // --- HAREKET MANTIĞI (Barikat bitse bile en iyi kareye) ---
        if(bPath.length > 0) {
            b.x = bPath[0].x; b.y = bPath[0].y;
        } else {
            // Yol tamamen kapalıysa (teknik olarak imkansız ama önlem), rakibe yaklaşmayı dene
            let dirs = [[0,1],[1,0],[-1,0],[0,-1]];
            for(let [dx,dy] of dirs) {
                let nx=b.x+dx, ny=b.y+dy;
                if(nx>=0 && nx<GRID && ny>=0 && ny<GRID && !isBlocked(b.x,b.y,nx,ny,state.walls)) {
                    b.x=nx; b.y=ny; break;
                }
            }
        }

        if(b.y===6) end("BOT KAZANDI"); else next();
    }

    function end(m) { state.over=true; document.getElementById('msg').innerText = m; draw(); }
    
    setDiff('insane');
</script>
</body>
</html>
