<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Platinum Plus</title>
    <style>
        :root { --orange: #ff8c00; --bg: #030303; --card: #111; --blue: #00e5ff; }
        body { 
            background: var(--bg); color: white; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; overflow: hidden;
        }

        /* Yeni Neon Profil Paneli */
        .profile-bar {
            width: 100%; max-width: 350px; background: var(--card); padding: 15px;
            border-radius: 15px; border: 2px solid #222; margin-bottom: 15px;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.1);
        }
        .id-label { font-size: 0.65rem; color: var(--orange); letter-spacing: 2px; font-weight: bold; margin-bottom: 5px; }
        .id-value { font-size: 1rem; color: #fff; font-weight: 900; font-family: monospace; margin-bottom: 10px; }
        
        .name-edit-area { display: flex; gap: 8px; }
        .name-input-mini {
            flex: 1; background: #000; border: 1px solid #333; color: #fff;
            padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; outline: none; transition: 0.3s;
        }
        .name-input-mini:focus { border-color: var(--orange); box-shadow: 0 0 8px var(--orange); }
        .btn-save-mini {
            background: var(--orange); color: #000; border: none; padding: 0 15px;
            border-radius: 8px; font-weight: 900; font-size: 0.7rem; cursor: pointer;
        }

        .header { text-align: center; margin-bottom: 10px; }
        h1 { margin: 0; font-size: 1.1rem; color: var(--orange); letter-spacing: 1.5px; font-weight: 900; }
        #msg { color: #fff; font-size: 0.8rem; min-height: 18px; margin: 5px 0; font-weight: bold; }

        .scoreboard { display: flex; gap: 8px; width: 100%; max-width: 350px; margin-bottom: 10px; }
        .card { 
            flex: 1; background: var(--card); border: 2px solid #222; padding: 8px; 
            border-radius: 12px; text-align: center;
        }
        .card.active { border-color: var(--orange); box-shadow: 0 0 15px var(--orange); }
        .num { font-size: 1.6rem; color: var(--orange); font-weight: 900; }
        .timer { font-size: 0.8rem; color: #fff; margin-top: 5px; font-family: monospace; }

        /* Mod Seçimi - Online Butonu Eklendi */
        .mode-selection { display: flex; gap: 5px; width: 100%; max-width: 350px; margin-bottom: 10px; }
        .btn-main { 
            flex: 1; padding: 12px 5px; font-size: 0.65rem; font-weight: 900; 
            background: #000; border: 2px solid #333; border-radius: 8px; cursor: pointer; color: #fff; transition: 0.2s;
        }
        .btn-main.active[data-mode="bot"] { border-color: var(--orange); background: var(--orange); color: #000; }
        .btn-main.active[data-mode="pvp"] { border-color: var(--blue); background: var(--blue); color: #000; }
        .btn-main.active[data-mode="online"] { border-color: #f1c40f; background: #f1c40f; color: #000; }

        .diff-selection { display: flex; gap: 4px; margin-bottom: 10px; }
        .btn-diff { 
            background: #111; color: #555; border: 1px solid #333; 
            padding: 6px 12px; border-radius: 5px; font-size: 0.65rem; font-weight: bold; cursor: pointer;
        }
        .btn-diff.active { border-color: #fff; color: #fff; background: #222; }

        .canvas-container { border: 3px solid #1a1a1a; border-radius: 15px; background: #000; }
        canvas { display: block; touch-action: none; border-radius: 12px; }

        /* Online Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-box {
            background: #000; border: 2px solid var(--orange); border-radius: 20px;
            padding: 25px; width: 280px; text-align: center; box-shadow: 0 0 30px var(--orange);
        }
        .neon-input {
            background: #111; border: 1px solid var(--orange); color: white;
            padding: 12px; border-radius: 10px; width: 100%; margin: 15px 0; outline: none; text-align: center; box-sizing: border-box;
        }
        .btn-action {
            background: var(--orange); color: #000; border: none; padding: 12px; 
            border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="profile-bar">
        <div class="id-label">MY BARRICADE ID</div>
        <div class="id-value" id="display-my-id">---</div>
        <div class="name-edit-area">
            <input type="text" id="user-name-input" class="name-input-mini" placeholder="Yeni İsim..." maxlength="12">
            <button class="btn-save-mini" onclick="updateName()">SET</button>
        </div>
    </div>

    <div id="room-screen" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <h1 style="font-size: 1.1rem; color: var(--orange);">ONLINE LOBBY</h1>
            <input type="text" id="target-room-id" class="neon-input" placeholder="Rakip ID Giriniz">
            <label style="font-size:0.7rem; color:#888">SÜRE LİMİTİ</label>
            <select id="time-limit" class="neon-input">
                <option value="0">SINIRSIZ</option>
                <option value="180">3 DAKİKA</option>
                <option value="300">5 DAKİKA</option>
            </select>
            <button class="btn-action" onclick="startOnlineRoom()">EŞLEŞMEYİ BAŞLAT</button>
            <button class="btn-action" style="background:#222; color:#fff" onclick="toggleRoomModal(false)">GERİ DÖN</button>
        </div>
    </div>

    <div class="header">
        <h1>BARRICADE PLATINUM</h1>
        <div id="msg">SİSTEM ÇEVRİMİÇİ</div>
    </div>

    <div class="scoreboard">
        <div id="c0" class="card active">
            <small id="name-p1" style="color:var(--orange); font-weight:bold">PLAYER</small>
            <div class="num" id="w0">10</div>
            <div class="timer" id="t0">--:--</div>
        </div>
        <div id="c1" class="card">
            <small id="p2-label">BOT</small>
            <div class="num" id="w1">10</div>
            <div class="timer" id="t1">--:--</div>
        </div>
    </div>

    <div class="mode-selection">
        <button id="m_bot" class="btn-main active" data-mode="bot" onclick="setMode('bot')">BOT</button>
        <button id="m_pvp" class="btn-main" data-mode="pvp" onclick="setMode('pvp')">2 KİŞİ</button>
        <button id="m_online" class="btn-main" data-mode="online" onclick="toggleRoomModal(true)">ONLINE</button>
    </div>

    <div class="diff-selection" id="diff-box">
        <button id="d_easy" class="btn-diff" onclick="setDiff('easy')">KOLAY</button>
        <button id="d_hard" class="btn-diff" onclick="setDiff('hard')">ZOR</button>
        <button id="d_insane" class="btn-diff active" onclick="setDiff('insane')">İMKANSIZ</button>
    </div>

    <div class="canvas-container">
        <canvas id="game" width="350" height="350"></canvas>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 7, CELL = 350/7;
    
    let state = {
        turn: 0, walls: [], over: false, mode: 'bot', diff: 'insane',
        players: [{x:3, y:6, w:10, c:'#ff4757', ty:0, time: 0}, {x:3, y:0, w:10, c:'#2e86de', ty:6, time: 0}],
        timerInterval: null
    };

    function initUser() {
        let myId = localStorage.getItem('barricade_fixed_id');
        if(!myId) {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            myId = '';
            for(let i=0; i<8; i++) {
                myId += chars.charAt(Math.floor(Math.random() * chars.length));
                if(i === 3) myId += "-";
            }
            localStorage.setItem('barricade_fixed_id', myId);
        }
        document.getElementById('display-my-id').innerText = myId;
        
        let savedName = localStorage.getItem('barricade_name') || "PLAYER";
        document.getElementById('name-p1').innerText = savedName.toUpperCase();
        document.getElementById('user-name-input').value = savedName;
    }

    function updateName() {
        const input = document.getElementById('user-name-input');
        const val = input.value.trim().substring(0, 12);
        if(val.length >= 2) {
            localStorage.setItem('barricade_name', val);
            document.getElementById('name-p1').innerText = val.toUpperCase();
            document.getElementById('msg').innerText = "İSİM KAYDEDİLDİ";
            input.blur();
        }
    }

    function toggleRoomModal(s) { 
        document.getElementById('room-screen').style.display = s ? 'flex' : 'none'; 
    }

    function setMode(m) {
        state.mode = m;
        document.querySelectorAll('.btn-main').forEach(b => {
            b.classList.toggle('active', b.getAttribute('data-mode') === m);
        });
        document.getElementById('diff-box').style.visibility = (m === 'bot') ? 'visible' : 'hidden';
        document.getElementById('p2-label').innerText = (m === 'pvp' || m === 'online') ? "RAKİP" : "BOT";
        reset();
    }

    function setDiff(d) {
        state.diff = d;
        document.querySelectorAll('.btn-diff').forEach(b => b.classList.remove('active'));
        document.getElementById('d_'+d).classList.add('active');
        reset();
    }

    function reset() {
        clearInterval(state.timerInterval);
        state.players[0].x=3; state.players[0].y=6; state.players[0].w=10;
        state.players[1].x=3; state.players[1].y=0; state.players[1].w=10;
        state.walls=[]; state.turn=0; state.over=false;
        document.getElementById('msg').innerText = "SIRA SENDE";
        updateTimerDisplay();
        draw();
    }

    function startOnlineRoom() {
        const targetId = document.getElementById('target-room-id').value.trim();
        if(targetId.length < 5) {
            alert("Lütfen geçerli bir Rakip ID giriniz!");
            return;
        }
        const timeVal = parseInt(document.getElementById('time-limit').value);
        state.players[0].time = timeVal;
        state.players[1].time = timeVal;
        setMode('online');
        toggleRoomModal(false);
        document.getElementById('msg').innerText = "BAĞLANTI KURULDU: " + targetId;
        if(timeVal > 0) startTimer();
    }

    function startTimer() {
        clearInterval(state.timerInterval);
        state.timerInterval = setInterval(() => {
            if(!state.over) {
                state.players[state.turn].time--;
                if(state.players[state.turn].time <= 0) end("SÜRE DOLDU!");
                updateTimerDisplay();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        [0,1].forEach(i => {
            const p = state.players[i];
            document.getElementById('t'+i).innerText = p.time > 0 ? 
                `${Math.floor(p.time/60)}:${(p.time%60).toString().padStart(2,'0')}` : "--:--";
        });
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,350,350);
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
        for(let i=0; i<=GRID; i++) {
            ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,350); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(350,i*CELL); ctx.stroke();
        }
        state.walls.forEach(w => {
            ctx.fillStyle = varColor('--orange');
            if(w.t === 'v') ctx.fillRect((w.x+1)*CELL-4, w.y*CELL+4, 8, CELL-8);
            else ctx.fillRect(w.x*CELL+4, (w.y+1)*CELL-4, CELL-8, 8);
        });
        state.players.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x*CELL+CELL/2, p.y*CELL+CELL/2, CELL*0.35, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill();
            if(state.turn === i) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke(); }
        });
        document.getElementById('w0').innerText = state.players[0].w;
        document.getElementById('w1').innerText = state.players[1].w;
        document.getElementById('c0').className = state.turn===0?'card active':'card';
        document.getElementById('c1').className = state.turn===1?'card active':'card';
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

    function isBlocked(x1, y1, x2, y2, walls) {
        if(x1 === x2) return walls.some(w => w.t === 'h' && w.x === x1 && w.y === Math.min(y1, y2));
        if(y1 === y2) return walls.some(w => w.y === y1 && w.x === Math.min(x1, x2) && w.t === 'v');
        return false;
    }

    function getPathLen(px, py, ty, walls) {
        let q = [{x:px, y:py, d:0}], vis = new Set([px+','+py]);
        while(q.length) {
            let c = q.shift(); if(c.y === ty) return c.d;
            for(let [dx,dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx=c.x+dx, ny=c.y+dy;
                if(nx>=0 && nx<GRID && ny>=0 && ny<GRID && !vis.has(nx+','+ny) && !isBlocked(c.x,c.y,nx,ny,walls)) {
                    vis.add(nx+','+ny); q.push({x:nx, y:ny, d:c.d+1});
                }
            }
        }
        return 999;
    }

    canvas.addEventListener('mousedown', (e) => {
        if(state.over || (state.mode === 'bot' && state.turn === 1)) return;
        const r = canvas.getBoundingClientRect();
        const x = (e.clientX-r.left)*(350/r.width), y = (e.clientY-r.top)*(350/r.height);
        const cx = Math.floor(x/CELL), cy = Math.floor(y/CELL), mx = x%CELL, my = y%CELL;
        if(mx > CELL*0.8 && cx < 6 && placeWall(cx, cy, 'v', state.turn)) { next(); return; }
        if(my > CELL*0.8 && cy < 6 && placeWall(cx, cy, 'h', state.turn)) { next(); return; }
        let p = state.players[state.turn];
        if(Math.abs(cx-p.x)+Math.abs(cy-p.y)===1 && !isBlocked(p.x,p.y,cx,cy,state.walls)) {
            p.x=cx; p.y=cy; if(p.y === p.ty) end("KAZANDINIZ!"); else next();
        }
    });

    function placeWall(x, y, t, pIdx) {
        if(state.players[pIdx].w <= 0) return false;
        if(state.walls.some(w=>w.x===x && w.y===y && w.t===t)) return false;
        let test = [...state.walls, {x,y,t}];
        if(getPathLen(state.players[0].x, state.players[0].y, 0, test) < 999 && 
           getPathLen(state.players[1].x, state.players[1].y, 6, test) < 999) {
            state.walls.push({x,y,t}); state.players[pIdx].w--; return true;
        }
        return false;
    }

    function next() {
        state.turn = 1 - state.turn; draw();
        if(!state.over && state.mode === 'bot' && state.turn === 1) setTimeout(botAction, 300);
    }

    function botAction() {
        let b = state.players[1], p = state.players[0];
        let moves = [[0,1],[1,0],[-1,0],[0,-1]].filter(m => {
            let nx=b.x+m[0], ny=b.y+m[1];
            return nx>=0 && nx<GRID && ny>=0 && ny<GRID && !isBlocked(b.x,b.y,nx,ny,state.walls);
        }).sort((a, b_m) => getPathLen(b.x+a[0], b.y+a[1], 6, state.walls) - getPathLen(b.x+b_m[0], b.y+b_m[1], 6, state.walls));
        if(moves.length) { b.x += moves[0][0]; b.y += moves[0][1]; }
        if(b.y === 6) end("BOT KAZANDI!"); else next();
    }

    function end(m) { state.over=true; clearInterval(state.timerInterval); document.getElementById('msg').innerText = m; draw(); }

    initUser();
    setMode('bot');
</script>
</body>
</html>
