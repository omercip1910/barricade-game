<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Elite</title>
    <style>
        :root { --bg: #0d0d0d; --red: #ff4757; --blue: #2e86de; --gold: #ff8c00; }
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 20px; }
        
        /* MOBİL UYUMLU NAVBAR */
        .navbar { width: 100%; max-width: 500px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .scoreboard { display: flex; gap: 10px; width: 100%; }
        .card { flex: 1; background: #1a1a1a; padding: 10px; border-radius: 12px; text-align: center; border: 2px solid #333; }
        .card.active-0 { border-color: var(--red); box-shadow: 0 0 10px rgba(255, 71, 87, 0.3); }
        .card.active-1 { border-color: var(--blue); box-shadow: 0 0 10px rgba(46, 134, 222, 0.3); }
        
        .num { font-size: 1.4rem; font-weight: 800; display: block; }
        .label { font-size: 0.65rem; color: #aaa; text-transform: uppercase; }

        /* MOBİL BUTONLAR */
        .btn-group { display: flex; gap: 5px; width: 100%; }
        button { background: #222; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; cursor: pointer; flex: 1; }
        button.active { background: var(--gold); color: black; border-color: var(--gold); }

        /* OYUN ALANI - EKRANA TAM OTURAN YAPILANDIRMA */
        .canvas-container { position: relative; width: 95vw; max-width: 420px; aspect-ratio: 1/1; background: #1a1a1a; border-radius: 12px; padding: 5px; border: 1px solid #333; }
        canvas { width: 100%; height: 100%; background: #000; border-radius: 8px; display: block; }
        
        #msg { height: 30px; color: var(--gold); font-weight: bold; margin: 10px 0; font-size: 1rem; }
        .reset-link { margin-top: 10px; color: #777; text-decoration: underline; font-size: 0.9rem; padding: 10px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="scoreboard">
            <div id="c0" class="card">
                <span class="label" style="color:var(--red)">OYUNCU 1</span>
                <span id="w0" class="num" style="color:var(--red)">10</span>
                <span class="label">ENGEL</span>
            </div>
            <div id="c1" class="card">
                <span id="n1" class="label" style="color:var(--blue)">BOT</span>
                <span id="w1" class="num" style="color:var(--blue)">10</span>
                <span class="label">ENGEL</span>
            </div>
        </div>
        <div class="btn-group">
            <button id="pve" class="active" onclick="setMode('pve')">BOT</button>
            <button id="pvp" onclick="setMode('pvp')">2 KİŞİ</button>
        </div>
        <div id="diffs" class="btn-group">
            <button onclick="setDiff('easy')">KOLAY</button>
            <button id="def-diff" class="active" onclick="setDiff('medium')">ORTA</button>
            <button onclick="setDiff('hard')">ZOR</button>
            <button onclick="setDiff('impossible')">İMKANSIZ</button>
        </div>
    </div>

    <div id="msg"></div>

    <div class="canvas-container">
        <canvas id="game" width="420" height="420"></canvas>
    </div>

    <div class="reset-link" onclick="location.reload()">Oyunu Yeniden Başlat</div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 7, CELL = 60;
    let state = { players: [{x:3,y:6,w:10,c:'#ff4757'},{x:3,y:0,w:10,c:'#2e86de'}], turn: 0, walls: [], mode: 'pve', diff: 'medium', over: false };

    // [JS Kısmı aynı şekilde kalıyor, sadece layout css ile esnekleşti]
    window.setMode = (m) => { state.mode = m; document.getElementById('pve').className = m==='pve'?'active':''; document.getElementById('pvp').className = m==='pvp'?'active':''; document.getElementById('n1').innerText = m==='pvp'?'OYUNCU 2':'BOT'; document.getElementById('diffs').style.display = m==='pvp'?'none':'flex'; reset(); };
    window.setDiff = (d) => { state.diff = d; document.querySelectorAll('#diffs button').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); reset(); };

    function draw() {
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,420,420);
        ctx.strokeStyle = "#222";
        for(let i=0; i<=GRID; i++) {
            ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,420); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(420,i*CELL); ctx.stroke();
        }
        state.walls.forEach(w => {
            ctx.fillStyle = "#ff8c00";
            if(w.t === 'v') ctx.fillRect((w.x+1)*CELL-5, w.y*CELL, 10, CELL);
            else ctx.fillRect(w.x*CELL, (w.y+1)*CELL-5, CELL, 10);
        });
        state.players.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x*CELL+30, p.y*CELL+30, 20, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill();
            if(state.turn === i) { ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke(); }
        });
        document.getElementById('w0').innerText = state.players[0].w;
        document.getElementById('w1').innerText = state.players[1].w;
        document.getElementById('c0').className = `card ${state.turn===0?'active-0':''}`;
        document.getElementById('c1').className = `card ${state.turn===1?'active-1':''}`;
    }

    function handleInput(e) {
        if(state.over || (state.mode==='pve' && state.turn===1)) return;
        const r = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = (clientX - r.left) * (420 / r.width);
        const y = (clientY - r.top) * (420 / r.height);
        const cx = Math.floor(x/CELL), cy = Math.floor(y/CELL);
        const mx = x % CELL, my = y % CELL;

        if(state.players[state.turn].w > 0 && (mx > 45 || my > 45)) {
            let t = mx > 45 ? 'v' : 'h';
            if(!state.walls.find(w => w.x===cx && w.y===cy && w.t===t)) {
                state.walls.push({x:cx, y:cy, t:t});
                state.players[state.turn].w--; next();
            }
        } else {
            let p = state.players[state.turn];
            if(Math.abs(cx-p.x)+Math.abs(cy-p.y)===1 && !isB(p.x,p.y,cx,cy)) {
                p.x = cx; p.y = cy;
                if(p.y===(state.turn===0?0:6)) { state.over=true; document.getElementById('msg').innerText = "KAZANDIN!"; }
                next();
            }
        }
    }

    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});

    function isB(x1,y1,x2,y2) {
        if(x1===x2) return state.walls.some(w=>w.t==='h' && w.x===x1 && w.y===Math.min(y1,y2));
        return state.walls.some(w=>w.t==='v' && w.y===y1 && w.x===Math.min(x1,x2));
    }
    function next() { state.turn = 1-state.turn; draw(); if(!state.over && state.mode==='pve' && state.turn===1) setTimeout(bot, 600); }
    function bot() { let b = state.players[1]; if(!isB(b.x,b.y,b.x,b.y+1) && b.y < 6) b.y++; else if(b.x < 6 && !isB(b.x,b.y,b.x+1,b.y)) b.x++; else if(b.x > 0) b.x--; if(b.y===6) { state.over=true; document.getElementById('msg').innerText = "BOT KAZANDI!"; } next(); }
    function reset() { state.players[0].x=3; state.players[0].y=6; state.players[1].x=3; state.players[1].y=0; state.players[0].w=10; state.players[1].w=10; state.walls=[]; state.turn=0; state.over=false; document.getElementById('msg').innerText=""; draw(); }
    draw();
</script>
</body>
</html>
