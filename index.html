<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Platinum Plus</title>
    <style>
        :root { --orange: #ff8c00; --bg: #030303; --card: #111; --blue: #00e5ff; }
        body { 
            background: var(--bg); color: white; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; overflow: hidden;
        }
        .header { text-align: center; margin-bottom: 5px; width: 100%; max-width: 400px; }
        h1 { margin: 0; font-size: 1.1rem; color: var(--orange); letter-spacing: 1.5px; font-weight: 900; }
        #msg { color: #fff; font-size: 0.8rem; min-height: 18px; margin: 5px 0; font-weight: bold; }

        .scoreboard { display: flex; gap: 8px; width: 100%; max-width: 400px; margin-bottom: 10px; }
        .card { 
            flex: 1; background: var(--card); border: 2px solid #222; padding: 8px; 
            border-radius: 12px; text-align: center; transition: 0.3s;
        }
        .card.active { border-color: var(--orange); box-shadow: 0 0 15px var(--orange); }
        .num { font-size: 1.6rem; color: var(--orange); font-weight: 900; }
        .timer { font-size: 0.8rem; color: #fff; margin-top: 5px; font-family: monospace; }

        .mode-selection { display: flex; gap: 8px; width: 100%; max-width: 400px; margin-bottom: 8px; }
        .btn-main { 
            flex: 1; padding: 14px; font-size: 0.8rem; font-weight: 900; 
            background: #000; border: 3px solid #333; border-radius: 10px; cursor: pointer; transition: 0.2s;
        }
        .btn-main.bot-mode { color: var(--orange); border-color: var(--orange); }
        .btn-main.bot-mode.active { background: var(--orange); color: #000; box-shadow: 0 0 15px var(--orange); }
        .btn-main.pvp-mode { color: var(--blue); border-color: var(--blue); }
        .btn-main.pvp-mode.active { background: var(--blue); color: #000; box-shadow: 0 0 15px var(--blue); }

        .diff-selection { display: flex; gap: 4px; margin-bottom: 10px; }
        .btn-diff { 
            background: #111; color: #555; border: 1px solid #333; 
            padding: 6px 12px; border-radius: 5px; font-size: 0.65rem; font-weight: bold; cursor: pointer;
        }
        .btn-diff.active { border-color: #fff; color: #fff; background: #222; }

        .canvas-container { border: 3px solid #1a1a1a; border-radius: 15px; background: #000; position: relative; }
        canvas { display: block; touch-action: none; border-radius: 12px; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-box {
            background: #000; border: 3px solid var(--orange); border-radius: 20px;
            padding: 25px; width: 300px; text-align: center; box-shadow: 0 0 25px var(--orange);
        }
        .neon-input {
            background: #111; border: 1px solid var(--orange); color: white;
            padding: 12px; border-radius: 8px; width: 90%; outline: none;
            font-weight: bold; text-align: center; margin: 15px 0; font-size: 1rem;
        }
        .id-display { font-size: 0.75rem; color: #888; margin-bottom: 15px; }
        .btn-action {
            background: var(--orange); color: black; border: none; padding: 12px 25px; 
            border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px;
        }
        .btn-create {
            position: fixed; right: 20px; bottom: 20px; background: #000; border: 2px solid var(--orange);
            color: var(--orange); padding: 10px 15px; border-radius: 50px; font-weight: 900; cursor: pointer;
            box-shadow: 0 0 10px var(--orange); font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="modal-overlay">
        <div class="modal-box">
            <h1 style="font-size: 1.2rem;">PROFİL OLUŞTUR</h1>
            <input type="text" id="user-name-input" class="neon-input" placeholder="İsim Yazın" maxlength="14">
            <div class="id-display">ID'NİZ: <span id="display-my-id" style="color:white; font-weight:bold;">---</span></div>
            <button class="btn-action" onclick="savePlayerProfile()">KAYDET VE GİRİŞ YAP</button>
        </div>
    </div>

    <div id="room-screen" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <h1 style="font-size: 1.1rem;">ODA AYARLARI</h1>
            <input type="text" id="target-room-id" class="neon-input" placeholder="Oda Sahibi ID Gir">
            <label style="font-size:0.8rem; color:var(--orange)">SÜRE MODU</label>
            <select id="time-limit" class="neon-input">
                <option value="0">ZAMANSIZ</option>
                <option value="60">1 DAKİKA</option>
                <option value="180">3 DAKİKA</option>
                <option value="300">5 DAKİKA</option>
            </select>
            <button class="btn-action" onclick="startOnlineRoom()">ODAYI BAŞLAT</button>
            <button class="btn-action" style="background:#333; color:white" onclick="toggleRoomModal(false)">İPTAL</button>
        </div>
    </div>

    <div class="header">
        <h1>BARRICADE PLATINUM PLUS</h1>
        <div id="msg">HOŞ GELDİNİZ</div>
    </div>

    <div class="scoreboard">
        <div id="c0" class="card active">
            <small id="name-p1">OYUNCU 1</small>
            <div class="num" id="w0">10</div>
            <div class="timer" id="t0">--:--</div>
        </div>
        <div id="c1" class="card">
            <small id="p2-label">BOT</small>
            <div class="num" id="w1">10</div>
            <div class="timer" id="t1">--:--</div>
        </div>
    </div>

    <div class="mode-selection">
        <button id="m_bot" class="btn-main bot-mode active" onclick="setMode('bot')">BOT İLE OYNA</button>
        <button id="m_pvp" class="btn-main pvp-mode" onclick="setMode('pvp')">2 KİŞİLİK OYNA</button>
    </div>

    <div class="diff-selection" id="diff-box">
        <button id="d_easy" class="btn-diff" onclick="setDiff('easy')">KOLAY</button>
        <button id="d_hard" class="btn-diff" onclick="setDiff('hard')">ZOR</button>
        <button id="d_insane" class="btn-diff active" onclick="setDiff('insane')">İMKANSIZ</button>
    </div>

    <div class="canvas-container">
        <canvas id="game" width="350" height="350"></canvas>
    </div>

    <button class="btn-create" onclick="toggleRoomModal(true)">CREATE ROOM</button>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 7, CELL = 350/7;
    
    let state = {
        turn: 0, walls: [], over: false, mode: 'bot', diff: 'insane',
        players: [{x:3, y:6, w:10, c:'#ff4757', ty:0, time: 0}, {x:3, y:0, w:10, c:'#2e86de', ty:6, time: 0}],
        history: [], timerInterval: null
    };

    // --- PROFİL VE ID SİSTEMİ (TAMİR EDİLDİ) ---
    function initProfile() {
        let myId = localStorage.getItem('barricade_id');
        if(!myId) {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            myId = '';
            for(let i=0; i<9; i++) {
                myId += chars.charAt(Math.floor(Math.random() * chars.length));
                if((i === 2 || i === 5) && i !== 8) myId += "-";
            }
            localStorage.setItem('barricade_id', myId);
        }
        document.getElementById('display-my-id').innerText = myId;
        
        let savedName = localStorage.getItem('barricade_name');
        if(savedName) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('name-p1').innerText = savedName.toUpperCase();
        }
    }

    function savePlayerProfile() {
        const input = document.getElementById('user-name-input');
        const val = input.value.trim();
        const hasLetter = /[a-zA-ZİıĞğÜüŞşÖö]/.test(val);
        const onlyAlphanumeric = /^[a-zA-Z0-9İıĞğÜüŞşÖö]+$/.test(val);

        if(val.length >= 1 && val.length <= 14 && hasLetter && onlyAlphanumeric) {
            localStorage.setItem('barricade_name', val);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('name-p1').innerText = val.toUpperCase();
            document.getElementById('msg').innerText = "BAŞARIYLA GİRİŞ YAPILDI";
        } else {
            alert("HATA: İsim 1-14 karakter olmalı, boşluk içermemeli ve en az 1 harf bulundurmalıdır!");
        }
    }

    function toggleRoomModal(show) {
        document.getElementById('room-screen').style.display = show ? 'flex' : 'none';
    }

    function startOnlineRoom() {
        const timeVal = parseInt(document.getElementById('time-limit').value);
        state.players[0].time = timeVal;
        state.players[1].time = timeVal;
        toggleRoomModal(false);
        reset();
        if(timeVal > 0) startTimer();
    }

    function setMode(m) {
        state.mode = m;
        document.getElementById('m_bot').className = 'btn-main bot-mode' + (m==='bot'?' active':'');
        document.getElementById('m_pvp').className = 'btn-main pvp-mode' + (m==='pvp'?' active':'');
        document.getElementById('diff-box').style.visibility = (m === 'bot') ? 'visible' : 'hidden';
        document.getElementById('p2-label').innerText = (m === 'pvp') ? "2. OYUNCU" : "BOT";
        reset();
    }

    function setDiff(d) {
        state.diff = d;
        document.querySelectorAll('.btn-diff').forEach(b => b.classList.remove('active'));
        document.getElementById('d_'+d).classList.add('active');
        reset();
    }

    function reset() {
        clearInterval(state.timerInterval);
        state.players[0].x=3; state.players[0].y=6; state.players[0].w=10;
        state.players[1].x=3; state.players[1].y=0; state.players[1].w=10;
        state.walls=[]; state.turn=0; state.over=false; state.history=[];
        document.getElementById('msg').innerText = "SIRA 1. OYUNCUDA";
        updateTimerDisplay();
        draw();
    }

    function startTimer() {
        clearInterval(state.timerInterval);
        state.timerInterval = setInterval(() => {
            if(!state.over) {
                state.players[state.turn].time--;
                if(state.players[state.turn].time <= 0) calculateWinnerByRules("SÜRE BİTTİ!");
                updateTimerDisplay();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        [0,1].forEach(i => {
            const p = state.players[i];
            document.getElementById('t'+i).innerText = p.time > 0 ? 
                `${Math.floor(p.time/60)}:${(p.time%60).toString().padStart(2,'0')}` : "--:--";
        });
    }

    function calculateWinnerByRules(reason) {
        clearInterval(state.timerInterval);
        state.over = true;
        const d0 = getPathLen(state.players[0].x, state.players[0].y, 0, state.walls);
        const d1 = getPathLen(state.players[1].x, state.players[1].y, 6, state.walls);
        let winner = d0 < d1 ? "1. OYUNCU" : (d1 < d0 ? "2. OYUNCU / BOT" : "BERABERLİK");
        document.getElementById('msg').innerText = reason + " KAZANAN: " + winner;
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,350,350);
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
        for(let i=0; i<=GRID; i++) {
            ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,350); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(350,i*CELL); ctx.stroke();
        }
        state.walls.forEach(w => {
            ctx.fillStyle = '#ff8c00';
            if(w.t === 'v') ctx.fillRect((w.x+1)*CELL-4, w.y*CELL+4, 8, CELL-8);
            else ctx.fillRect(w.x*CELL+4, (w.y+1)*CELL-4, CELL-8, 8);
        });
        state.players.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x*CELL+CELL/2, p.y*CELL+CELL/2, CELL*0.35, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill();
            if(state.turn === i) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke(); }
        });
        document.getElementById('w0').innerText = state.players[0].w;
        document.getElementById('w1').innerText = state.players[1].w;
        document.getElementById('c0').className = state.turn===0?'card active':'card';
        document.getElementById('c1').className = state.turn===1?'card active':'card';
    }

    function isBlocked(x1, y1, x2, y2, walls) {
        if(x1 === x2) return walls.some(w => w.t === 'h' && w.x === x1 && w.y === Math.min(y1, y2));
        if(y1 === y2) return walls.some(w => w.y === y1 && w.x === Math.min(x1, x2) && w.t === 'v');
        return false;
    }

    function getPathLen(px, py, ty, walls) {
        let q = [{x:px, y:py, d:0}], vis = new Set([px+','+py]);
        while(q.length) {
            let c = q.shift(); if(c.y === ty) return c.d;
            for(let [dx,dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx=c.x+dx, ny=c.y+dy;
                if(nx>=0 && nx<GRID && ny>=0 && ny<GRID && !vis.has(nx+','+ny) && !isBlocked(c.x,c.y,nx,ny,walls)) {
                    vis.add(nx+','+ny); q.push({x:nx, y:ny, d:c.d+1});
                }
            }
        }
        return 999;
    }

    canvas.addEventListener('mousedown', (e) => {
        if(state.over || (state.mode === 'bot' && state.turn === 1)) return;
        const r = canvas.getBoundingClientRect();
        const x = (e.clientX-r.left)*(350/r.width), y = (e.clientY-r.top)*(350/r.height);
        const cx = Math.floor(x/CELL), cy = Math.floor(y/CELL), mx = x%CELL, my = y%CELL;
        if(mx > CELL*0.8 && cx < 6 && placeWall(cx, cy, 'v', state.turn)) { next(); return; }
        if(my > CELL*0.8 && cy < 6 && placeWall(cx, cy, 'h', state.turn)) { next(); return; }
        let p = state.players[state.turn];
        if(Math.abs(cx-p.x)+Math.abs(cy-p.y)===1 && !isBlocked(p.x,p.y,cx,cy,state.walls)) {
            p.x=cx; p.y=cy; if(p.y === p.ty) end("KAZANDINIZ!"); else next();
        }
    });

    function placeWall(x, y, t, pIdx) {
        if(state.players[pIdx].w <= 0) return false;
        if(state.walls.some(w=>w.x===x && w.y===y && w.t===t)) return false;
        let test = [...state.walls, {x,y,t}];
        if(getPathLen(state.players[0].x, state.players[0].y, 0, test) < 999 && 
           getPathLen(state.players[1].x, state.players[1].y, 6, test) < 999) {
            state.walls.push({x,y,t}); state.players[pIdx].w--; return true;
        }
        return false;
    }

    function next() {
        state.turn = 1 - state.turn; draw();
        if(!state.over && state.mode === 'bot' && state.turn === 1) setTimeout(botAction, 300);
    }

    function botAction() {
        let b = state.players[1], p = state.players[0];
        if(state.diff !== 'easy' && b.w > 0 && (getPathLen(p.x, p.y, 0, state.walls) <= getPathLen(b.x, b.y, 6, state.walls))) {
            if(placeWall(p.x, p.y-1, 'h', 1)) { next(); return; }
        }
        let moves = [[0,1],[1,0],[-1,0],[0,-1]].filter(m => {
            let nx=b.x+m[0], ny=b.y+m[1];
            return nx>=0 && nx<GRID && ny>=0 && ny<GRID && !isBlocked(b.x,b.y,nx,ny,state.walls);
        }).sort((a, b_m) => getPathLen(b.x+a[0], b.y+a[1], 6, state.walls) - getPathLen(b.x+b_m[0], b.y+b_m[1], 6, state.walls));
        if(moves.length) { b.x += moves[0][0]; b.y += moves[0][1]; }
        if(b.y === 6) end("BOT KAZANDI!"); else next();
    }

    function end(m) { state.over=true; clearInterval(state.timerInterval); document.getElementById('msg').innerText = m; draw(); }
    
    initProfile();
    setMode('bot');
</script>
</body>
</html>
