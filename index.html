<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Elite | Mobil Pro</title>
    <style>
        :root { --bg: #0d0d0d; --red: #ff4757; --blue: #2e86de; --gold: #ff8c00; }
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* MOBİL NAVBAR / SKORBOARD */
        .navbar { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 8px; padding: 10px; box-sizing: border-box; }
        .scoreboard { display: flex; gap: 8px; }
        .card { flex: 1; background: #1a1a1a; padding: 8px; border-radius: 10px; text-align: center; border: 2px solid #333; transition: 0.3s; }
        .card.active-0 { border-color: var(--red); box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
        .card.active-1 { border-color: var(--blue); box-shadow: 0 0 15px rgba(46, 134, 222, 0.4); }
        .num { font-size: 1.5rem; font-weight: bold; display: block; }
        .label { font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        /* MOD VE ZORLUK BUTONLARI */
        .btn-group { display: flex; gap: 4px; justify-content: center; }
        button { background: #222; color: #aaa; border: 1px solid #444; padding: 6px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        button.active { background: var(--gold); color: black; border-color: var(--gold); }

        /* OYUN ALANI */
        .canvas-container { position: relative; margin-top: 10px; padding: 5px; background: #1a1a1a; border-radius: 12px; border: 1px solid #333; }
        canvas { background: #000; border-radius: 8px; max-width: 92vw; height: auto; display: block; }
        
        #msg { height: 25px; color: var(--gold); font-weight: bold; margin-top: 10px; font-size: 0.9rem; }
        .reset-link { margin: 15px; color: #555; text-decoration: underline; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="scoreboard">
            <div id="c0" class="card">
                <span class="label" style="color:var(--red)">OYUNCU 1</span>
                <span id="w0" class="num" style="color:var(--red)">10</span>
                <span class="label">ENGEL</span>
            </div>
            <div id="c1" class="card">
                <span id="n1" class="label" style="color:var(--blue)">BOT</span>
                <span id="w1" class="num" style="color:var(--blue)">10</span>
                <span class="label">ENGEL</span>
            </div>
        </div>
        <div class="btn-group">
            <button id="pve" class="active" onclick="setMode('pve')">BOT'A KARŞI</button>
            <button id="pvp" onclick="setMode('pvp')">2 KİŞİ (AYNI TEL)</button>
        </div>
        <div id="diffs" class="btn-group">
            <button onclick="setDiff('easy')">KOLAY</button>
            <button id="def-diff" class="active" onclick="setDiff('medium')">ORTA</button>
            <button onclick="setDiff('hard')">ZOR</button>
            <button onclick="setDiff('impossible')">İMKANSIZ</button>
        </div>
    </div>

    <div id="msg"></div>

    <div class="canvas-container">
        <canvas id="game" width="420" height="420"></canvas>
    </div>

    <div class="reset-link" onclick="location.reload()">Oyunu Yeniden Başlat</div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 7, CELL = 60;
    let state = { players: [{x:3,y:6,w:10,c:'#ff4757'},{x:3,y:0,w:10,c:'#2e86de'}], turn: 0, walls: [], mode: 'pve', diff: 'medium', over: false };

    window.setMode = (m) => { 
        state.mode = m; 
        document.getElementById('pve').className = m==='pve'?'active':''; 
        document.getElementById('pvp').className = m==='pvp'?'active':''; 
        document.getElementById('n1').innerText = m==='pvp'?'OYUNCU 2':'BOT'; 
        document.getElementById('diffs').style.display = m==='pvp'?'none':'flex'; 
        reset(); 
    };
    window.setDiff = (d) => { 
        state.diff = d; 
        document.querySelectorAll('#diffs button').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        reset(); 
    };

    function draw() {
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,420,420);
        ctx.strokeStyle = "#1a1a1a";
        for(let i=0; i<=GRID; i++) {
            ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,420); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(420,i*CELL); ctx.stroke();
        }
        state.walls.forEach(w => {
            ctx.fillStyle = "#ff8c00"; ctx.shadowBlur = 10; ctx.shadowColor = "#ff8c00";
            if(w.t === 'v') ctx.fillRect((w.x+1)*CELL-5, w.y*CELL, 10, CELL);
            else ctx.fillRect(w.x*CELL, (w.y+1)*CELL-5, CELL, 10);
            ctx.shadowBlur = 0;
        });
        state.players.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x*CELL+30, p.y*CELL+30, 22, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.shadowBlur = 15; ctx.shadowColor = p.c;
            ctx.fill(); ctx.shadowBlur = 0;
            if(state.turn === i) { ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke(); }
        });
        document.getElementById('w0').innerText = state.players[0].w;
        document.getElementById('w1').innerText = state.players[1].w;
        document.getElementById('c0').className = `card ${state.turn===0?'active-0':''}`;
        document.getElementById('c1').className = `card ${state.turn===1?'active-1':''}`;
    }

    function handleInput(e) {
        if(state.over || (state.mode==='pve' && state.turn===1)) return;
        const r = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const scaleX = 420 / r.width;
        const scaleY = 420 / r.height;
        const x = (clientX - r.left) * scaleX;
        const y = (clientY - r.top) * scaleY;

        const cx = Math.floor(x/CELL), cy = Math.floor(y/CELL);
        const mx = x % CELL, my = y % CELL;

        // MOBİL İÇİN GENİŞLETİLMİŞ DOKUNMA ALANI (TOLERANS: 15px)
        const tolerance = 15;
        if(state.players[state.turn].w > 0) {
            if (mx > CELL - tolerance && cx < GRID - 1) { placeWall(cx, cy, 'v'); return; }
            if (my > CELL - tolerance && cy < GRID - 1) { placeWall(cx, cy, 'h'); return; }
        }

        // HAREKET
        let p = state.players[state.turn];
        if(Math.abs(cx-p.x)+Math.abs(cy-p.y)===1 && !isB(p.x,p.y,cx,cy)) {
            p.x = cx; p.y = cy;
            if(p.y===(state.turn===0?0:6)) { state.over=true; document.getElementById('msg').innerText = "TEBRİKLER, KAZANDIN!"; }
            next();
        }
    }

    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});

    function isB(x1,y1,x2,y2) {
        if(x1===x2) return state.walls.some(w=>w.t==='h' && w.x===x1 && w.y===Math.min(y1,y2));
        return state.walls.some(w=>w.t==='v' && w.y===y1 && w.x===Math.min(x1,x2));
    }

    function placeWall(wx, wy, t) {
        if(!state.walls.find(w => w.x===wx && w.y===wy && w.t===t)) {
            state.walls.push({x:wx, y:wy, t:t});
            state.players[state.turn].w--; next();
        }
    }

    function next() { state.turn = 1-state.turn; draw(); if(!state.over && state.mode==='pve' && state.turn===1) setTimeout(bot, 600); }
    
    function bot() { 
        let b = state.players[1];
        if(!isB(b.x,b.y,b.x,b.y+1) && b.y < 6) b.y++; 
        else if(b.x < 6 && !isB(b.x,b.y,b.x+1,b.y)) b.x++;
        else if(b.x > 0) b.x--;
        if(b.y===6) { state.over=true; document.getElementById('msg').innerText = "BOT KAZANDI!"; }
        next(); 
    }
    
    function reset() { state.players[0].x=3; state.players[0].y=6; state.players[1].x=3; state.players[1].y=0; state.players[0].w=10; state.players[1].w=10; state.walls=[]; state.turn=0; state.over=false; document.getElementById('msg').innerText=""; draw(); }
    draw();
</script>
</body>
</html>
